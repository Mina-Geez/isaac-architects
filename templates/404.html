<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1A1A1A;--paper:#FAFAF8;--stone:#8B7355;--deep:#0E0E0E;
--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans','Helvetica Neue',sans-serif}
body{font-family:var(--sans);background:var(--deep);color:var(--paper);
-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100svh;
display:flex;flex-direction:column;align-items:center;justify-content:center;
text-align:center;padding:2rem;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;pointer-events:none;
background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(139,115,85,.10),transparent)}
.nf{position:relative;z-index:1;max-width:560px}
.nf-logo img{height:48px;margin-bottom:3rem}
.nf-code{font-family:var(--serif);font-weight:300;font-size:clamp(5rem,18vw,9rem);
line-height:1;color:var(--stone);opacity:.85}
.nf-title{font-family:var(--serif);font-weight:300;font-size:clamp(1.8rem,5vw,2.6rem);
line-height:1.15;margin:.5rem 0 1.25rem;text-wrap:balance}
.nf-text{font-weight:300;line-height:1.7;color:rgba(240,237,232,.55);
max-width:420px;margin:0 auto 2.5rem;text-wrap:pretty}
.nf-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.nf-btn{display:inline-flex;align-items:center;justify-content:center;min-height:52px;
padding:1rem 2rem;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;
font-weight:500;text-decoration:none;transition:all .3s;
background:var(--stone);color:var(--paper)}
.nf-btn:hover{background:var(--paper);color:var(--deep)}
.nf-btn-ghost{background:transparent;color:var(--paper);border:1px solid rgba(240,237,232,.3)}
.nf-btn-ghost:hover{background:rgba(139,115,85,.15);border-color:var(--stone);color:var(--paper)}
@media(max-width:520px){.nf-actions{flex-direction:column}.nf-btn{width:100%}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<main class="nf">
  <a class="nf-logo" href="/"><img src="/brand/logo-lockup-dark.svg" alt="Isaac Architects"></a>
  <div class="nf-code">404</div>
  <h1 class="nf-title">This page isn't here</h1>
  <p class="nf-text">The page may have moved, or never existed. Let's get you back to the work.</p>
  <div class="nf-actions">
    <a class="nf-btn" href="/">Return home</a>
    <a class="nf-btn nf-btn-ghost" href="/#work">View the work</a>
  </div>
</main>
</body>
</html>
